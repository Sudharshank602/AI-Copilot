## AI Personal Intelligence Copilot
## Docker Compose — Production Deployment
##
## Usage:
##   docker-compose up --build
##   docker-compose up -d    (detached)
##   docker-compose down

version: "3.9"

services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: copilot-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data              # Persist vector DB + SQLite
      - ./models:/app/models          # Persist HF model cache
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_DB_TYPE=${VECTOR_DB_TYPE:-faiss}
      - DATABASE_URL=sqlite:///./data/copilot.db
      - FAISS_INDEX_PATH=./data/faiss_index
      - CHROMA_DB_PATH=./data/chroma_db
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - copilot-net

  # ── Streamlit Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: copilot-frontend
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - copilot-net

networks:
  copilot-net:
    driver: bridge

volumes:
  copilot-data:
  copilot-models:
